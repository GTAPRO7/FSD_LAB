</head>

            <a href="history.html"

                <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600" fill="none" stroke="currentColor"

                    <div class="w-full lg:w-1/3 space-y-6 mt-4">

                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z">
                                            </path>
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                                        </svg>
                                        <select id="start-location"
                                            class="w-full py-3 px-2 bg-transparent focus:outline-none appearance-none cursor-pointer text-sm truncate">
                                            <option value="" disabled selected>Select start...</option>
                                            <option value="current">📍 Your Location</option>
                                            <option value="main-entrance">Main Entrance</option>
                                            <option value="library">Central Library</option>
                                            <option value="cafeteria">Cafeteria</option>
                                        </select>

                                        </svg>
                                    </div>

                                            viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z">
                                            </path>
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                                        </svg>

                                            <option value="room-813">Room 813</option>

                                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7">
                                        </path>

                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z">
                                        </path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                    <div class="w-full pt-4 lg:w-2/3 mt-4 lg:mt-0">

                            class="bg-white p-2 rounded-2xl shadow-xl border border-slate-200 relative overflow-hidden">

                                class="absolute top-6 left-6 bg-white/90 backdrop-blur px-4 py-2 rounded-lg shadow-sm border border-slate-100 z-10 pointer-events-none">
                                <h3 id="map-title" class="font-bold text-slate-800 text-sm">Campus Overview</h3>
                                <p id="map-subtitle" class="text-xs text-slate-500">Awaiting routing instructions...</p>
                            </div>

                        </div>
                    </div>
                </div>
            </section>

    <script>
        // =========================================================
        // CAMPUS GRAPH DATA (Coordinate mapping for Canvas rendering)
        // =========================================================
        const campusGraph = {
            'main-entrance': { x: 100, y: 380, label: 'Main Entrance' },
            'library': { x: 300, y: 150, label: 'Central Library' },

            // Class Rooms
            'room-810': { x: 700, y: 100, label: 'Room 810 (CS Lab)' },
            'room-813': { x: 720, y: 120, label: 'Room 813 (Physics)' },
            'room-101': { x: 680, y: 140, label: 'Room 101 (Chemistry)' },

            // Teachers Cabin
            'teachers-cabin': { x: 640, y: 260, label: 'Teachers Cabin' },
            'teachers-cabin-cs': { x: 650, y: 250, label: 'CS Dept Cabin' },
            'teachers-cabin-math': { x: 630, y: 270, label: 'Math Dept Cabin' },

            // Restrooms
            'gents-toilet': { x: 200, y: 80, label: 'Gents Restroom' },
            'ladies-toilet': { x: 220, y: 80, label: 'Ladies Restroom' },

            // Cafeteria
            'cafeteria': { x: 500, y: 350, label: 'Main Cafeteria' },
            'coffee-shop': { x: 480, y: 330, label: 'Coffee Shop' },

            // Auditoriums
            'main-auditorium': { x: 400, y: 200, label: 'Main Auditorium' },
            'mini-auditorium': { x: 420, y: 220, label: 'Mini Auditorium' }
        };

        // --- NEW: Live Tracking State Variables ---
        let globalUserCoords = null;
        let watchId = null;
        let activeDestinationNode = null;
        let isNavigating = false;
        const ARRIVAL_THRESHOLD = 20; // How close (in pixels) before triggering arrival

        // =========================================================
        // API 1: GEOLOCATION API (Upgraded to Live Tracking)
        // =========================================================
        const startSelect = document.getElementById('start-location');
        const locStatus = document.getElementById('location-status');

        function startLiveTracking() {
            locStatus.classList.remove('hidden');
            locStatus.textContent = 'Acquiring live GPS lock...';
            locStatus.className = 'text-xs text-brand-600 mt-2 font-medium block';

            if ("geolocation" in navigator) {
                // Clear any existing watchers before starting a new one
                if (watchId !== null) navigator.geolocation.clearWatch(watchId);

                // watchPosition fires continuously as the device moves
                watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude.toFixed(5);
                        const lon = position.coords.longitude.toFixed(5);

                        // Map real GPS coordinates to Canvas coordinates
                        if (!globalUserCoords) {
                            // Set the initial GPS lock as the starting point on the map (Main Entrance)
                            window.baseLat = position.coords.latitude;
                            window.baseLon = position.coords.longitude;
                            globalUserCoords = { x: 100, y: 380, label: 'You' };
                        } else {
                            // Calculate difference from starting point
                            const latDiff = position.coords.latitude - window.baseLat;
                            const lonDiff = position.coords.longitude - window.baseLon;

                            // Convert degrees to approximate meters (1 deg = ~111,000m)
                            // Scale: 1 meter of physical movement = 5 pixels on canvas
                            globalUserCoords.y = 380 - (latDiff * 111000 * 5); // Latitude maps to Y axis
                            globalUserCoords.x = 100 + (lonDiff * 111000 * 5); // Longitude maps to X axis
                        }

                        locStatus.textContent = `📍 Live Tracking: ${lat}, ${lon}`;
                        locStatus.className = 'text-xs text-emerald-600 mt-2 font-medium block hover:text-emerald-700 transition-colors';
                        startSelect.value = 'current';

                        // If navigating, redraw map and check distance
                        if (isNavigating && activeDestinationNode) {
                            drawMapScene(globalUserCoords, activeDestinationNode);
                            checkArrival(globalUserCoords, activeDestinationNode);
                        }
                    },
                    (error) => {
                        locStatus.textContent = 'GPS connection lost. Please check permissions.';
                        locStatus.className = 'text-xs text-rose-500 mt-2 font-medium block';
                    },
                    { enableHighAccuracy: true, maximumAge: 0 }
                );
            } else {
                locStatus.textContent = 'Geolocation is not supported by this browser.';
            }
        }

        // Calculate distance and trigger popup
        function checkArrival(currentPos, destPos) {
            // Pythagorean theorem to find distance between two points on the canvas
            const dx = currentPos.x - destPos.x;
            const dy = currentPos.y - destPos.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < ARRIVAL_THRESHOLD && isNavigating) {
                isNavigating = false; // Stop checking so we don't spam the user

                // Trigger HTML5 Vibration API (if supported on mobile)
                if ("vibrate" in navigator) navigator.vibrate([200, 100, 200]);

                // Update UI and Trigger Popup
                document.getElementById('map-title').textContent = "🎯 Destination Reached!";
                document.getElementById('map-subtitle').textContent = "You have arrived.";

                // Small delay so the map renders the final step before the alert blocks the thread
                setTimeout(() => {
                    alert(`Destination Reached!\n\nYou have successfully arrived at ${destPos.label}.`);
                }, 100);
            }
        }

        document.getElementById('locate-btn').addEventListener('click', startLiveTracking);
        startSelect.addEventListener('change', (e) => {
            isNavigating = false;
            document.getElementById('map-title').textContent = "Campus Overview";
            document.getElementById('map-subtitle').textContent = "Awaiting routing instructions...";
            drawMapScene(); // Clear map
            if (e.target.value === 'current') startLiveTracking();
            else locStatus.classList.add('hidden');
        });

        document.getElementById('destination').addEventListener('change', () => {
            isNavigating = false;
            document.getElementById('map-title').textContent = "Campus Overview";
            document.getElementById('map-subtitle').textContent = "Awaiting routing instructions...";
            drawMapScene(); // Clear map
        });

        // =========================================================
        // API 2: CANVAS API (Map Rendering Engine)
        // =========================================================
        const canvas = document.getElementById('routeCanvas');
        const ctx = canvas.getContext('2d');

        function drawMapScene(startNode = null, destNode = null) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Architectural Grid
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for (let j = 0; j < canvas.height; j += 40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
            }

            // 2. Draw Walkways (Mock geometry)
            ctx.fillStyle = '#cbd5e1';
            ctx.fillRect(80, 130, 640, 40); // Top Hallway
            ctx.fillRect(80, 330, 460, 40); // Bottom Hallway
            ctx.fillRect(280, 130, 40, 240); // Vertical connector

            // 3. Draw All Graph Nodes (Landmarks)
            Object.values(campusGraph).forEach(node => {
                ctx.beginPath();
                ctx.arc(node.x, node.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#94a3b8';
                ctx.fill();
            });

            // 4. Draw Calculated Route
            if (startNode && destNode) {
                ctx.beginPath();
                ctx.moveTo(startNode.x, startNode.y);
                ctx.lineTo(startNode.x, destNode.y);
                ctx.lineTo(destNode.x, destNode.y);

                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 4;
                ctx.setLineDash([10, 8]);
                ctx.stroke();
                ctx.setLineDash([]);

                // Highlight Start/Live User Position (Green Pulse)
                ctx.beginPath(); ctx.arc(startNode.x, startNode.y, 10, 0, Math.PI * 2);
                ctx.fillStyle = '#10b981'; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();

                // Highlight Dest (Red)
                ctx.beginPath(); ctx.arc(destNode.x, destNode.y, 10, 0, Math.PI * 2);
                ctx.fillStyle = '#ef4444'; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
            }
        }

        drawMapScene();

        // --- NEW: Routing Form Submission ---
        document.getElementById('navigation-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const startKey = startSelect.value;
            const destKey = document.getElementById('destination').value;

            if (!startKey || !destKey) return alert("Please select both a start location and a destination.");

            let startNode = campusGraph[startKey];

            // If user selected live tracking, ensure watcher is active
            if (startKey === 'current') {
                if (!globalUserCoords) startLiveTracking();
                startNode = globalUserCoords || campusGraph['main-entrance'];
            }

            activeDestinationNode = campusGraph[destKey];
            isNavigating = true; // Activate the arrival checker

            document.getElementById('map-title').textContent = "Route Active";
            document.getElementById('map-subtitle').textContent = `Navigating to ${activeDestinationNode.label}...`;

            drawMapScene(startNode, activeDestinationNode);

            // Save to History
            const startLabel = startKey === 'current' ? 'Your Location' : (campusGraph[startKey] ? campusGraph[startKey].label : startKey);
            const routeRecord = {
                start: startLabel,
                destination: activeDestinationNode.label,
                timestamp: new Date().toISOString()
            };

            let historyData = JSON.parse(localStorage.getItem('campusNavHistory') || '[]');

            // Prevent consecutive duplicate entries (e.g. clicking Get Directions then Start)
            if (historyData.length === 0 || historyData[0].start !== routeRecord.start || historyData[0].destination !== routeRecord.destination) {
                historyData.unshift(routeRecord);
                localStorage.setItem('campusNavHistory', JSON.stringify(historyData));
            }

            // Use HTML5 History API to push state
            if (window.history && window.history.pushState) {
                window.history.pushState(routeRecord, '', `?route=${startKey}-to-${destKey}`);
            }
        });

        // =========================================================
        // API 5: WEB NOTIFICATIONS API
        // =========================================================
        document.getElementById('notify-btn').addEventListener('click', function () {
            if (!isNavigating) {
                // Alert the user via Web Notification API if they haven't clicked Get Directions
                const msg = "Please click 'Get Directions' first to calculate your route on the map.";
                if ("Notification" in window) {
                    if (Notification.permission === "granted") {
                        new Notification("Action Required", { body: msg });
                    } else if (Notification.permission !== "denied") {
                        Notification.requestPermission().then(permission => {
                            if (permission === "granted") {
                                new Notification("Action Required", { body: msg });
                            } else {
                                alert(msg);
                            }
                        });
                    } else {
                        alert(msg);
                    }
                } else {
                    alert(msg);
                }
                return;
            }

            this.innerHTML = `<span class="text-brand-600 font-bold">Navigating...</span>`;

            // Safety alert immediately upon start
            alert("⚠️ SAFETY FIRST ⚠️\n\nPlease stay focused on the real world and your surroundings while navigating to avoid accidents.");
        });

        // Mobile Sidebar Toggle
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('hidden')) {
                sidebar.classList.remove('hidden');
                sidebar.classList.add('flex');
            } else {
                sidebar.classList.add('hidden');
                sidebar.classList.remove('flex');
            }
        });

        // Close sidebar if clicked outside (on mobile)
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('mobile-menu-btn');
            if (window.innerWidth < 768 && !sidebar.classList.contains('hidden') && !sidebar.contains(e.target) && !btn.contains(e.target)) {
                sidebar.classList.add('hidden');
                sidebar.classList.remove('flex');
            }
        });
    </script>
</body>

</html>
