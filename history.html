<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusNav - Route History</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' }
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-slate-50 text-slate-800 font-sans antialiased selection:bg-brand-500 selection:text-white flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar"
        class="w-64 bg-white border-r border-slate-200 flex-shrink-0 flex-col transition-all duration-300 hidden md:flex absolute md:relative z-50 h-full shadow-2xl md:shadow-none">
        <div class="h-16 flex items-center px-6 border-b border-slate-200">
            <a href="index.html" class="flex items-center space-x-2 group cursor-pointer">
                <img src="logo.png" alt="CampusNav Logo" class="h-8 w-auto group-hover:scale-105 transition-transform"
                    onerror="this.style.display='none'" />
                <h1 class="text-xl font-extrabold tracking-tight text-slate-900">CampusNav</h1>
            </a>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <a href="user.html"
                class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-100 hover:text-slate-900 rounded-xl font-medium transition-colors group">
                <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                Navigate
            </a>
            <a href="places.html"
                class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-100 hover:text-slate-900 rounded-xl font-medium transition-colors group">
                <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                    </path>
                </svg>
                Places
            </a>
            <a href="history.html"
                class="flex items-center px-3 py-2.5 bg-brand-50 text-brand-600 rounded-xl font-medium transition-colors group">
                <svg class="w-5 h-5 mr-3 text-brand-600" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                History
            </a>
            <a href="#userinfo"
                class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-100 hover:text-slate-900 rounded-xl font-medium transition-colors group">
                <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                User Info
            </a>
        </nav>

        <div class="p-4 border-t border-slate-200">
            <a href="login.html"
                class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-100 hover:text-slate-900 rounded-xl font-medium transition-colors group">
                <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                    </path>
                </svg>
                Logout
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Top Header -->
        <header
            class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-8 flex-shrink-0">
            <div class="flex items-center">
                <button id="mobile-menu-btn" class="md:hidden text-slate-500 hover:text-brand-600 transition-colors mr-4">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <h2 class="text-xl font-semibold text-slate-800">Navigation History</h2>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="clearHistory()" class="text-sm font-medium text-rose-500 hover:text-rose-600 transition-colors">
                    Clear History
                </button>
                <div class="h-8 w-8 rounded-full bg-brand-500 flex items-center justify-center text-white font-bold cursor-pointer">
                    A
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto overflow-x-hidden bg-[#f8fafc] p-4 sm:p-8">
            <div class="max-w-4xl mx-auto">
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-slate-900">Recent Routes</h2>
                    <p class="text-slate-500 text-sm mt-1">Review your previously searched and navigated paths.</p>
                </div>

                <div id="history-container" class="space-y-4">
                    <!-- History items will be populated here via JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <script>
        function formatDate(isoString) {
            const date = new Date(isoString);
            const today = new Date();
            const isToday = date.getDate() === today.getDate() && date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear();
            
            const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            if (isToday) {
                return `Today at ${timeStr}`;
            }
            
            const dateStr = date.toLocaleDateString([], { month: 'short', day: 'numeric' });
            return `${dateStr} at ${timeStr}`;
        }

        function loadHistory() {
            const container = document.getElementById('history-container');
            const historyData = JSON.parse(localStorage.getItem('campusNavHistory') || '[]');

            if (historyData.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-2xl border border-slate-200 p-12 text-center shadow-sm">
                        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800 mb-1">No history yet</h3>
                        <p class="text-slate-500 text-sm max-w-sm mx-auto">When you search for routes and navigate the campus, your history will appear here.</p>
                        <a href="user.html" class="inline-block mt-6 px-5 py-2.5 bg-brand-600 text-white font-medium rounded-lg hover:bg-brand-700 transition-colors">Start Navigating</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = historyData.map((route, index) => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition-shadow flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-brand-50 text-brand-600 rounded-full flex items-center justify-center flex-shrink-0">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                        </div>
                        <div>
                            <div class="flex items-center space-x-2">
                                <span class="font-medium text-slate-900">${route.start}</span>
                                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                                </svg>
                                <span class="font-bold text-brand-600">${route.destination}</span>
                            </div>
                            <p class="text-xs text-slate-500 mt-1">${formatDate(route.timestamp)}</p>
                        </div>
                    </div>
                    <a href="user.html" class="text-sm font-medium text-brand-600 bg-brand-50 hover:bg-brand-100 px-4 py-2 rounded-lg transition-colors text-center">
                        Navigate Again
                    </a>
                </div>
            `).join('');
        }

        function clearHistory() {
            if (confirm("Are you sure you want to clear your navigation history?")) {
                localStorage.removeItem('campusNavHistory');
                loadHistory();
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();

            // Mobile Sidebar Toggle
            document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                const sidebar = document.getElementById('sidebar');
                if (sidebar.classList.contains('hidden')) {
                    sidebar.classList.remove('hidden');
                    sidebar.classList.add('flex');
                } else {
                    sidebar.classList.add('hidden');
                    sidebar.classList.remove('flex');
                }
            });

            // Close sidebar if clicked outside (on mobile)
            document.addEventListener('click', (e) => {
                const sidebar = document.getElementById('sidebar');
                const btn = document.getElementById('mobile-menu-btn');
                if (window.innerWidth < 768 && !sidebar.classList.contains('hidden') && !sidebar.contains(e.target) && !btn.contains(e.target)) {
                    sidebar.classList.add('hidden');
                    sidebar.classList.remove('flex');
                }
            });
        });
    </script>
</body>
</html>
